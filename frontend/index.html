function generateTN() {
  return 'SNT-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 7).toUpperCase();
}

function getOrders() {
  try { return JSON.parse(localStorage.getItem('santet_orders')) || []; } catch(e) { return []; }
}

function saveOrders(orders) {
  localStorage.setItem('santet_orders', JSON.stringify(orders));
}

function mockDelay() {
  return new Promise(function(r) { setTimeout(r, 50 + Math.random() * 150); });
}

async function api(path, options) {
  await mockDelay();
  if (path === '/products' && (!options || !options.method || options.method === 'GET')) {
    return { success: true, data: PRODUCTS_DATA };
  }
  if (path === '/counter') {
    var count = 69420 + getOrders().length;
    return { success: true, data: { count: count } };
  }
  if (path === '/orders' && options && options.method === 'POST') {
    try { var body = JSON.parse(options.body || '{}'); } catch(e) { body = {}; }
    var newOrder = {
      id: 'ord_' + Date.now().toString(36) + Math.random().toString(36).substring(2,6),
      trackingNumber: generateTN(),
      productId: body.productId || '',
      productName: body.productName || '',
      targetName: body.targetName || '',
      senderName: body.senderName || '',
      deliveryMethod: body.deliveryMethod || 'biasa',
      status: 'diproses',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      progress: 0
    };
    var orders = getOrders();
    orders.unshift(newOrder);
    saveOrders(orders);
    return { success: true, data: newOrder };
  }
  var pm = path.match(/^\/orders\/(.+)$/);
  if (pm && options && options.method === 'PATCH') {
    try { var body2 = JSON.parse(options.body || '{}'); } catch(e) { body2 = {}; }
    var orders2 = getOrders();
    for (var i = 0; i < orders2.length; i++) {
      if (orders2[i].id === pm[1] || orders2[i].trackingNumber === pm[1]) {
        orders2[i].status = body2.status || orders2[i].status;
        orders2[i].updatedAt = new Date().toISOString();
        saveOrders(orders2);
        return { success: true, data: orders2[i] };
      }
    }
    return { success: false, error: 'Order tidak ditemukan' };
  }
  if (path === '/orders' && (!options || !options.method || options.method === 'GET')) {
    return { success: true, data: getOrders() };
  }
  var idM = path.match(/^\/orders\/(.+)$/);
  var tnM = path.match(/^\/track\/(.+)$/);
  var sk = idM ? idM[1] : (tnM ? tnM[1] : null);
  if (sk) {
    var orders3 = getOrders();
    for (var j = 0; j < orders3.length; j++) {
      if (orders3[j].id === sk || orders3[j].trackingNumber === sk) {
        return { success: true, data: orders3[j] };
      }
    }
    if (tnM) return { success: false, error: 'Tracking number tidak ditemukan' };
  }
  return { success: false, error: 'Not found' };
}

    async function showRitual(productId, duration) {
      const ritual = RITUALS[productId];
      if (!ritual) {
        await showLoading(duration || 1500);
        return;
      }
      const screen = document.getElementById('loadingScreen');
      const emojiEl = document.getElementById('ritualEmoji');
      const textEl = document.getElementById('loadingText');
      const particlesEl = document.getElementById('ritualParticles');

      emojiEl.textContent = ritual.emoji;
      emojiEl.className = 'ritual-emoji-big ritual-bounce';
      particlesEl.innerHTML = '';
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('span');
        p.className = 'ritual-particle';
        p.textContent = ritual.particles[Math.floor(Math.random() * ritual.particles.length)];
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = (Math.random() * 2) + 's';
        p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
        particlesEl.appendChild(p);
      }
      let textIdx = 0;
      textEl.textContent = ritual.texts[0];
      const textInterval = setInterval(() => {
        textIdx = (textIdx + 1) % ritual.texts.length;
        textEl.textContent = ritual.texts[textIdx];
      }, 800);
      screen.classList.add('active');
      await new Promise(r => setTimeout(r, duration || ritual.duration));
      clearInterval(textInterval);
      screen.classList.remove('active');
      emojiEl.className = 'ritual-emoji-big';
      particlesEl.innerHTML = '';
    }

    async function showLoading(duration) {
      if (!duration) duration = 1500;
      const screen = document.getElementById('loadingScreen');
      const emojiEl = document.getElementById('ritualEmoji');
      const particlesEl = document.getElementById('ritualParticles');

      emojiEl.className = 'ritual-emoji-big';
      particlesEl.innerHTML = '';
      const text = document.getElementById('loadingText');
      text.textContent = texts[Math.floor(Math.random() * texts.length)];
      screen.classList.add('active');
      await new Promise(r => setTimeout(r, duration));
      screen.classList.remove('active');
    }

    function navigate(page, params) {
      // Clear any tracking intervals on navigation
      trackingIntervals.forEach(clearInterval);
      trackingIntervals = [];
      window.history.pushState({ page, params }, '', '#' + page);
      renderPage(page, params);
    }

    window.addEventListener('popstate', function(e) {
      const hash = location.hash.slice(1) || 'home';
      renderPage(hash);
    });

      await showLoading(800);
      const container = document.getElementById('pageContent');

        case 'order': renderOrder(container, params); break;
        case 'order-success': renderOrderSuccess(container, params); break;
        case 'tracking': renderTrackingForm(container); break;
        case 'track-result': renderTrackingResult(container, params); break;
        case 'admin-login': renderAdminLogin(container); break;
        case 'admin': renderAdmin(container); break;
        default: renderHome(container);
      }
    }

      setTimeout(function() { toast.classList.remove('active'); }, 3500);

        deliveryMethod: deliveryInput ? deliveryInput.value : 'Angin',

    function copyTracking(tn) {
      navigator.clipboard.writeText(tn).then(function() {
        var feedback = document.getElementById('copyFeedback');
        if (feedback) {
          feedback.classList.remove('hidden');
          setTimeout(function() { feedback.classList.add('hidden'); }, 3000);
        }
      }).catch(function() {
        var display = document.getElementById('trackingDisplay');
        if (display) {
          var range = document.createRange();
          range.selectNode(display);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
          document.execCommand('copy');
          var feedback = document.getElementById('copyFeedback');
          if (feedback) {
            feedback.classList.remove('hidden');
            setTimeout(function() { feedback.classList.add('hidden'); }, 3000);
          }
        }
      });
    }

    // ===== TRACKING RESULT — LIVE SIMULATOR! =====
    function renderTrackingResult(container, data) {
      // Clear old intervals
      trackingIntervals.forEach(clearInterval);

      const order = (typeof data === 'object' && data !== null) ? data : null;
      if (!order) {
        container.innerHTML = '<div class="tracking-error"><h3>Data tidak valid</h3></div>';

      const STATUS_FLOW = ['diproses', 'dikirim', 'dalam-perjalanan', 'selesai'];

      const STATUS_COLORS = { diproses: 'warning', dikirim: 'info', 'dalam-perjalanan': 'info', selesai: 'success', gagal: 'danger' };
      const PROGRESS_PCT = { diproses: 15, dikirim: 40, 'dalam-perjalanan': 70, selesai: 100, gagal: 100 };

      // Fake status messages for live simulation
      const LIVE_MESSAGES = {
        diproses: [
          'Dukun sedang merapal mantra pembuka...',
          'Memanaskan kuali... kuali dipanasin...',
          'Dukun baca buku petunjuk santet...',
          'Jin pengirim sedang di-onboard...',
          'Menyiapkan sesajen digital...'
        ],
        dikirim: [
          'Santet sudah meninggalkan markas dukun!',
          'Dalam perjalanan via jalur angin...',
          'Terbang di atas atmosfer astral...',
          'Melewati portal dimensi ke-5...',
          'Santet hampir sampai! ETA tidak lama lagi!'
        ],
        'dalam-perjalanan': [
          'Santet mendekati target...',
          'Dukun melakukan pengecekan rute...',
          'Santet menghindari radar karma...',
          'Sisa perjalanan: beberapa dimensi lagi...',
          'Target tidak sadar sedang didekati santet...'
        ],
        selesai: [
          '✅ SANTET BERHASIL SAMPAI!',
          'Target terkena santet!',
          'Dukun mengucap syukur...',
          'Ritual selesai. Silahkan order lagi!'
        ],
        gagal: [
          '💀 SANTET GAGAL!',
          'Target ternyata punya ilmu kebal...',
          'Santet dipantul balik!'
        ]
      };

      function getRandomMessage(status) {
        var msgs = LIVE_MESSAGES[status] || ['Status tidak diketahui...'];
        return msgs[Math.floor(Math.random() * msgs.length)];
      }

      // Letakkan HTML
      const currentIdx = STATUS_FLOW.indexOf(order.status);
      var statusHtml = '';
      for (var s = 0; s < STATUS_FLOW.length; s++) {
        var st = STATUS_FLOW[s];
        var isActive = s <= currentIdx;
        var isCurrent = s === currentIdx;
        statusHtml += '<span class="live-progress-step' + (isActive ? ' active' : '') + (isCurrent ? ' current' : '') + '">' + STATUS_ICONS[st] + ' ' + st.charAt(0).toUpperCase() + st.slice(1).replace('-', ' ') + '</span>';
        if (s < STATUS_FLOW.length - 1) {
          statusHtml += '<span class="live-progress-connector' + (isActive && s < currentIdx ? ' active' : '') + '"></span>';
        }
      }

      // Box copy tracking
      var isFinished = (order.status === 'selesai' || order.status === 'gagal');

      container.innerHTML = [
        '<div class="tracking-result">',
          '<div class="tracking-result-header">',
            '<h2>🔮 Live Tracking Santet</h2>',
            '<div class="tracking-live-badge" id="liveBadge">',
              isFinished ? '<span class="badge badge-' + STATUS_COLORS[order.status] + '">Status: ' + order.status.replace(/-/g, ' ') + '</span>' : '<span class="live-dot"></span> LIVE',
            '</div>',
          '</div>',

          // Tracking number — bisa dicopy!
          '<div class="tracking-result-copy">',
            '<span class="info-label">Tracking Number</span>',
            '<div class="tracking-result-tn">',
              '<span class="tracking-number-display" id="trackResultTn">' + order.trackingNumber + '</span>',
              '<button class="btn btn-sm btn-ghost" onclick="copyTrackResultTn(\'' + order.trackingNumber + '\')">📋 Copy</button>',
            '</div>',
            '<small class="form-hint">Silahkan copy nomor tracking untuk memantau lagi nanti</small>',
          '</div>',

          // Info grid
          '<div class="tracking-info-grid">',
            '<div class="tracking-info-item"><span class="info-label">Jenis Santet</span><span class="info-value">' + order.productName + '</span></div>',
            '<div class="tracking-info-item"><span class="info-label">Target</span><span class="info-value">' + order.targetName + '</span></div>',
            '<div class="tracking-info-item"><span class="info-label">Metode</span><span class="info-value">' + order.deliveryMethod + '</span></div>',
            '<div class="tracking-info-item"><span class="info-label">Estimasi Tiba</span><span class="info-value">' + new Date(order.estimatedDelivery).toLocaleString('id-ID') + '</span></div>',
          '</div>',

          // Live progress bar!
          '<div class="live-progress-container" id="liveProgressContainer">',
            '<div class="live-progress-bar-track">',
              '<div class="live-progress-fill" id="liveProgressFill" style="width:' + PROGRESS_PCT[order.status] + '%"></div>',
            '</div>',
            '<div class="live-progress-steps" id="liveProgressSteps">' + statusHtml + '</div>',
            '<div class="live-message" id="liveMessage">',
              '<span class="live-message-icon">' + STATUS_ICONS[order.status] + '</span>',
              '<span class="live-message-text" id="liveMessageText">' + getRandomMessage(order.status) + '</span>',
            '</div>',
            '<div class="live-eta" id="liveEta">',
              isFinished ? '<span class="badge badge-success">✅ Proses selesai</span>' : '<span class="live-eta-text">🔄 Auto-refresh setiap 5 detik...</span>',
            '</div>',
          '</div>',

          // Timeline
          '<div class="tracking-timeline">',
            '<h3>Riwayat Perjalanan Santet</h3>',
            '<div id="timelineContainer">',
              order.statusHistory.map(function(h) {
                return '<div class="timeline-item"><div class="timeline-icon">' + (STATUS_ICONS[h.status] || '📌') + '</div><div class="timeline-content"><p class="timeline-message">' + h.message + '</p><small class="timeline-time">' + new Date(h.timestamp).toLocaleString('id-ID') + '</small></div></div>';
              }).join(''),
            '</div>',
          '</div>',

          '<div class="tracking-actions">',
            '<button class="btn btn-primary" onclick="navigate(\'products\')">🔮 Santet Lagi!</button>',
            '<button class="btn btn-ghost" onclick="navigate(\'tracking\')">📦 Lacak Lain</button>',
          '</div>',
        '</div>'
      ].join('\n');

      // ===== TRIGGER ANIMASI AWAL KALO UDAH SELESAI =====
      if (order.status === 'selesai') {
        setTimeout(function() { triggerSantetHit(order.productName, order.targetName); }, 500);
      } else if (order.status === 'gagal') {
        setTimeout(function() { triggerSantetFailed(order.productName, order.targetName); }, 500);
      }

      // ===== LIVE SIMULATOR (hanya untuk yang belum selesai) =====
      if (!isFinished) {
        var tn = order.trackingNumber;
        var interval = setInterval(async function() {
          var res = await api('/orders/track/' + tn);
          if (res.success) {
            var o = res.data;
            var flowIdx = STATUS_FLOW.indexOf(o.status);

            // Update progress fill
            var fill = document.getElementById('liveProgressFill');
            if (fill) {
              fill.style.width = (PROGRESS_PCT[o.status] || 15) + '%';
            }

            // Update steps
            var steps = document.querySelectorAll('.live-progress-step');
            var connectors = document.querySelectorAll('.live-progress-connector');
            for (var si = 0; si < steps.length; si++) {
              steps[si].classList.toggle('active', si <= flowIdx);
              steps[si].classList.toggle('current', si === flowIdx);
              if (connectors[si]) {
                connectors[si].classList.toggle('active', si < flowIdx);
              }
            }

            // Update message
            var msgText = document.getElementById('liveMessageText');
            if (msgText) msgText.textContent = getRandomMessage(o.status);
            var msgIcon = document.querySelector('.live-message-icon');
            if (msgIcon) msgIcon.textContent = STATUS_ICONS[o.status] || '📌';

            // Update badge
            var badge = document.getElementById('liveBadge');
            if (badge) {
              badge.innerHTML = '<span class="live-dot"></span> LIVE';
            }

            // Check if finished
            if (o.status === 'selesai' || o.status === 'gagal') {
              if (badge) {
                badge.innerHTML = '<span class="badge badge-' + STATUS_COLORS[o.status] + '">Status: ' + o.status.replace(/-/g, ' ') + '</span>';
              }
              var eta = document.getElementById('liveEta');
              if (eta) {
                eta.innerHTML = '<span class="badge badge-success">✅ Proses selesai</span>';
              }
              // TRIGGER ANIMATION KENA SANTET!
              if (o.status === 'selesai') {
                triggerSantetHit(o.productName, o.targetName);
              } else if (o.status === 'gagal') {
                triggerSantetFailed(o.productName, o.targetName);
              }
              clearInterval(interval);
            }
          }
        }, 5000);
        trackingIntervals.push(interval);
      }
    }

    function getHitAnim(productId) {

      var anim = HIT_ANIMS[productId];
      if (anim) return anim;
      // Fallback: cari berdasarkan kata kunci di nama produk

      if (p.includes('biasa') || p.includes('standar')) return HIT_ANIMS['santet-biasa'];

      if (p.includes('rejeki') || p.includes('duit') || p.includes('uang')) return HIT_ANIMS['santet-rejeki'];
      if (p.includes('cinta') || p.includes('love') || p.includes('romantis')) return HIT_ANIMS['santet-cinta'];
      if (p.includes('corporate') || p.includes('kantor') || p.includes('bisnis')) return HIT_ANIMS['santet-corporate'];
      if (p.includes('ultra') || p.includes('max') || p.includes('extreme')) return HIT_ANIMS['santet-ultra'];
      return HIT_ANIMS['santet-biasa'];
    }

    // ===== ANIMASI KENA SANTET! =====
    function triggerSantetHit(productName, targetName) {
      var container = document.getElementById('liveProgressContainer');
      if (!container) return;

      // Cari product ID dari nama
      var matchedId = 'santet-biasa';
      for (var k in HIT_ANIMS) {
        if (productName && HIT_ANIMS.hasOwnProperty(k)) {
          // Cek dari products array
          for (var pi = 0; pi < products.length; pi++) {
            if (products[pi].id === k && products[pi].name === productName) {
              matchedId = k;
              break;
            }
          }
        }
      }
      // Fallback: cari dari produk yang terdaftar
      if (products && products.length) {
        for (var pj = 0; pj < products.length; pj++) {
          if (products[pj].name === productName) {
            matchedId = products[pj].id;
            break;
          }
        }
      }

      var anim = getHitAnim(matchedId);
      var subtitle = anim.subtitle.replace('{target}', targetName).replace('{product}', productName);
      var joke = anim.joke.replace('{target}', targetName).replace('{product}', productName);

      // Overlay effect
      var overlay = document.createElement('div');
      overlay.className = 'santet-hit-overlay';
      overlay.innerHTML = [
        '<div class="santet-hit-boom">' + anim.boom + '</div>',
        '<div class="santet-hit-text">',
          '<span class="santet-hit-title">' + anim.title + '</span>',
          '<span class="santet-hit-subtitle">' + subtitle + '</span>',
          '<span class="santet-hit-joke">' + joke + '</span>',
        '</div>',
        '<div class="santet-hit-particles" id="santetHitParticles"></div>',
      ].join('\n');
      container.appendChild(overlay);

      // Particles sesuai produk
      var symbols = anim.symbols;
      var particleContainer = document.getElementById('santetHitParticles');
      if (particleContainer) {
        var count = matchedId === 'santet-ultra' ? 50 : 30;
        for (var i = 0; i < count; i++) {
          var p = document.createElement('span');
          p.className = 'santet-particle';
          p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          p.style.animationDelay = (Math.random() * 2) + 's';
          p.style.animationDuration = (0.5 + Math.random() * 1.5) + 's';
          var angle = Math.random() * 360;
          var dist = 50 + Math.random() * 150;
          var dx = Math.cos(angle * Math.PI / 180) * dist;
          var dy = Math.sin(angle * Math.PI / 180) * dist;
          p.style.setProperty('--dx', dx + 'px');
          p.style.setProperty('--dy', dy + 'px');
          p.style.setProperty('--dxf', (dx * 2.5) + 'px');
          p.style.setProperty('--dyf', (dy * 2.5) + 'px');
          p.style.fontSize = (0.8 + Math.random() * 2.5) + 'rem';
          particleContainer.appendChild(p);
        }
      }

      showToast('💥 ' + targetName + ' KENA ' + productName.toUpperCase() + '! ' + anim.boom, 'success');

      setTimeout(function() {
        overlay.classList.add('santet-hit-fadeout');
        setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 1500);
      }, 4500);
    }

    function triggerSantetFailed(productName, targetName) {
      var container = document.getElementById('liveProgressContainer');
      if (!container) return;

      // Cari product ID dari nama
      var matchedId = 'santet-biasa';
      if (products && products.length) {
        for (var pj = 0; pj < products.length; pj++) {
          if (products[pj].name === productName) {
            matchedId = products[pj].id;
            break;
          }
        }
      }

      var anim = getHitAnim(matchedId);
      var joke = 'Dukun kena backlash... wkwkwk. ' + anim.joke;

      var overlay = document.createElement('div');
      overlay.className = 'santet-hit-overlay santet-failed';
      overlay.innerHTML = [
        '<div class="santet-hit-boom">🛡️</div>',
        '<div class="santet-hit-text">',
          '<span class="santet-hit-title santet-failed-title">🙅 SANTET GAGAL!</span>',
          '<span class="santet-hit-subtitle">' + targetName + ' kebal! <strong>' + productName + '</strong> dipantulkin! 💀</span>',
          '<span class="santet-hit-joke">' + joke + '</span>',
        '</div>',
        '<div class="santet-hit-particles" id="santetFailedParticles"></div>',
      ].join('\n');
      container.appendChild(overlay);

      var symbols = ['🛡️','💀','😵','💢','🚫','😤','🤦','❌','🍃'];
      var particleContainer = document.getElementById('santetFailedParticles');
      if (particleContainer) {
        for (var i = 0; i < 25; i++) {
          var p = document.createElement('span');
          p.className = 'santet-particle';
          p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          p.style.animationDelay = (Math.random() * 2) + 's';
          p.style.animationDuration = (0.5 + Math.random() * 1.5) + 's';
          var angle = Math.random() * 360;
          var dist = 30 + Math.random() * 100;
          var dx = Math.cos(angle * Math.PI / 180) * dist;
          var dy = Math.sin(angle * Math.PI / 180) * dist;
          p.style.setProperty('--dx', dx + 'px');
          p.style.setProperty('--dy', dy + 'px');
          p.style.setProperty('--dxf', (dx * 2) + 'px');
          p.style.setProperty('--dyf', (dy * 2) + 'px');
          p.style.fontSize = (0.8 + Math.random() * 2) + 'rem';
          particleContainer.appendChild(p);
        }
      }

      showToast('🛡️ ' + targetName + ' kebal santet! Dukun gagal!', 'error');

      setTimeout(function() {
        overlay.classList.add('santet-hit-fadeout');
        setTimeout(function() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 1500);
      }, 4000);
    }

    // ===== ADMIN LOGIN =====
    function renderAdminLogin(container) {
      // Check if already logged in
      var loggedIn = sessionStorage.getItem('santet_admin_loggedin');
      if (loggedIn === 'true') {
        renderAdmin(container);
        return;
      }

      container.innerHTML = [
        '<section class="admin-login-page">',
          '<div class="admin-login-container">',
            '<div class="admin-login-header">',
              '<span class="admin-login-icon">🔐</span>',
              '<h1>Login <span class="gradient-text">Dukun</span></h1>',
              '<p class="admin-desc">Panel rahasia para dukun. Masukkan kredensial gaib anda.</p>',
            '</div>',
            '<form class="admin-login-form" onsubmit="adminLogin(event)">',
              '<div class="form-group">',
                '<label class="form-label">🧙 Nama Dukun</label>',
                '<input type="text" class="form-input" id="dukunName" placeholder="Contoh: Ki Joko Bodho" value="Ki Joko" required>',
              '</div>',
              '<div class="form-group">',
                '<label class="form-label">🔮 Level Dukun</label>',
                '<select class="form-input" id="dukunLevel">',
                  '<option value="1">Level 1 — Dukun Magang</option>',
                  '<option value="2">Level 2 — Dukun Muda</option>',
                  '<option value="3" selected>Level 3 — Dukun Berlisensi ✅</option>',
                  '<option value="4">Level 4 — Dukun Senior</option>',
                  '<option value="5">Level 5 — Dukun Legendaris</option>',
                '</select>',
                '<small class="form-hint">Minimal Level 3 untuk akses dashboard</small>',
              '</div>',
              '<div class="form-group">',
                '<label class="form-label">🗝️ Mantra Rahasia</label>',
                '<input type="password" class="form-input" id="dukunPassword" placeholder="Ketik: santet123" value="santet123" required>',
                '<small class="form-hint">Hint: santet123 (tenang, ini cuma parodi 😉)</small>',
              '</div>',
              '<button type="submit" class="btn btn-primary btn-lg btn-full">🔓 Buka Portal Dukun</button>',
            '</form>',
            '<div class="admin-login-joke">',
              '<p>💡 <em>"Ilmu tanpa amal ibarat santet tanpa target. Mubazir."</em></p>',
            '</div>',
            '<div id="loginError" class="admin-login-error hidden"></div>',
          '</div>',
        '</section>'
      ].join('\n');
    }

    function adminLogin(e) {
      e.preventDefault();
      var name = document.getElementById('dukunName').value.trim();
      var level = document.getElementById('dukunLevel').value;
      var password = document.getElementById('dukunPassword').value.trim();
      var errorEl = document.getElementById('loginError');

      if (!name) {
        errorEl.textContent = '❌ Nama dukun tidak boleh kosong! Dukun misterius tidak diperbolehkan.';
        errorEl.classList.remove('hidden');
        return;
      }

      if (parseInt(level) < 3) {
        errorEl.textContent = '❌ Level dukun minimal 3! Silahkan ikut training dukun dulu.';
        errorEl.classList.remove('hidden');
        return;
      }

      if (password !== 'santet123') {
        errorEl.textContent = '❌ Mantra rahasia salah! Coba combaLagi: santet123 (huruf kecil semua)';
        errorEl.classList.remove('hidden');
        return;
      }

      // Login berhasil!
      sessionStorage.setItem('santet_admin_loggedin', 'true');
      sessionStorage.setItem('santet_admin_name', name);
      sessionStorage.setItem('santet_admin_level', level);
      showToast('✅ Selamat datang, ' + name + '! Portal dukun terbuka! 🔓', 'success');
      navigate('admin');
    }

    // ===== ADMIN =====
    function renderAdmin(container) {
      container.innerHTML = [
        '<section class="admin-page">',
          '<div class="admin-header">',
            '<span class="admin-icon">⚙️</span>',
            '<h1>Dashboard <span class="gradient-text">Dukun</span></h1>',
            '<p class="admin-desc">Panel rahasia para dukun &mdash; pantau semua santet yang masuk.</p>',
            '<small class="admin-warning">🔐 Hanya untuk dukun level 3 ke atas.</small>',
          '</div>',
          '<div class="admin-orders" id="adminOrders"><div class="loading-products">Memuat data santet...</div></div>',
        '</section>'
      ].join('\n');
      loadAdminOrders();
    }

    async function loadAdminOrders() {
      const result = await api('/orders');
      const container = document.getElementById('adminOrders');
      if (!result.success) {
        container.innerHTML = '<p>Gagal memuat data santet. Mungkin kena serangan santet balik.</p>';
        return;
      }

      if (result.data.length === 0) {
        container.innerHTML = '<div class="admin-empty"><span>📭</span><h3>Belum ada santet masuk</h3><p>Yuk, santet seseorang! 👀</p></div>';
        return;
      }

      container.innerHTML = result.data.map(function(o) {
        var badgeCls = 'badge-warning';
        if (o.status === 'selesai') badgeCls = 'badge-success';
        else if (o.status === 'gagal') badgeCls = 'badge-danger';
        return [
          '<div class="admin-order-card">',
            '<div class="admin-order-header">',
              '<span class="admin-order-id">#' + o.id + '</span>',
              '<span class="badge ' + badgeCls + '">' + o.status.replace(/-/g, ' ') + '</span>',
            '</div>',
            '<div class="admin-order-body">',
              '<div class="admin-order-info">',
                '<p><strong>Tracking:</strong> ' + o.trackingNumber + '</p>',
                '<p><strong>Produk:</strong> ' + o.productName + '</p>',
                '<p><strong>Target:</strong> ' + o.targetName + '</p>',
                '<p><strong>Alasan:</strong> ' + o.reason + '</p>',
                '<p><strong>Metode:</strong> ' + o.deliveryMethod + '</p>',
                '<p><strong>Waktu:</strong> ' + new Date(o.createdAt).toLocaleString('id-ID') + '</p>',
              '</div>',
              '<div class="admin-order-actions">',
                '<select class="form-input admin-status-select" onchange="updateOrderStatus(\'' + o.id + '\', this.value)">',
                  '<option value="diproses"' + (o.status === 'diproses' ? ' selected' : '') + '>🕯️ Diproses</option>',
                  '<option value="dikirim"' + (o.status === 'dikirim' ? ' selected' : '') + '>🚀 Dikirim</option>',
                  '<option value="dalam-perjalanan"' + (o.status === 'dalam-perjalanan' ? ' selected' : '') + '>🌀 Dalam Perjalanan</option>',
                  '<option value="selesai"' + (o.status === 'selesai' ? ' selected' : '') + '>✅ Selesai</option>',
                  '<option value="gagal"' + (o.status === 'gagal' ? ' selected' : '') + '>💀 Gagal</option>',
                '</select>',
                '<button class="btn btn-sm btn-danger" onclick="showToast(\'Santet dibatalkan! Dukun dihukum push up 50x.\')">🛑 Batal</button>',
              '</div>',
            '</div>',
            '<div class="admin-order-footer"><small>Dibuat: ' + new Date(o.createdAt).toLocaleString('id-ID') + '</small></div>',
          '</div>'
        ].join('\n');
      }).join('\n');
    }

    async function updateOrderStatus(orderId, status) {
      const result = await api('/orders/' + orderId, {
        method: 'PATCH',
        body: JSON.stringify({ status: status })
      });
      if (result.success) {
        showToast('✅ Status santet diubah ke: ' + status.replace(/-/g, ' '), 'success');
      } else {
        showToast('❌ Gagal update status', 'error');
      }
    }

    function toggleNav() {
      document.getElementById('navLinks').classList.toggle('active');
    }

    // ===== INIT =====
    const hash = location.hash.slice(1) || 'home';
    renderPage(hash);
  </script>
</body>
